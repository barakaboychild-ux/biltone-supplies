<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | Biltone Supplies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Load CDN scripts synchronously for maximum reliability on file:// -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#E0F2F1',
                            100: '#B2DFDB',
                            500: '#009688',
                            600: '#00796B',
                            900: '#004D40',
                        },
                        accent: {
                            pink: '#EC4899',
                        }
                    }
                }
            }
        }
    </script>
    
    <script>
        // CONFIG - Hard-coded for maximum reliability
        const CONFIG = {
            SUPABASE_URL: 'https://lfyifioymiakqfeebnhd.supabase.co',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmeWlmaW95bWlha3FmZWVibmhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyMzg5OTEsImV4cCI6MjA4NTgxNDk5MX0.bsU3NBbV8mYt13QmbkWkNT97PFMHHW4K7aLa-IJcK-I'
        };

        // Standalone DB Helper (In case external db.js fails)
        let supabaseClient = null;
        window.DB = {
            async init() {
                if (supabaseClient) return true;
                if (window.supabase && window.supabase.createClient) {
                    supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
                    return true;
                }
                return false;
            },
            async loginUser(email, password) {
                if (!await this.init()) throw new Error("Supabase SDK not loaded");
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                return data.user;
            },
            async registerUser(email, password, name) {
                if (!await this.init()) throw new Error("Supabase SDK not loaded");
                const { data, error } = await supabaseClient.auth.signUp({
                    email, password, options: { data: { full_name: name } }
                });
                if (error) throw error;
                return data.user;
            }
        };

        // Initialize early
        setTimeout(() => window.DB.init(), 500);
    </script>
</head>

<body class="bg-cover bg-center bg-fixed font-sans text-gray-800 flex items-center justify-center min-h-screen"
    style="background-image: url('../images/admin_bg_lighter.png');">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md transition-all duration-300">
        <!-- Login Section -->
        <div id="login-section">
            <h1 class="text-2xl font-bold text-center text-gray-900 mb-6">Admin Login</h1>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="login-email" required
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="login-password" required
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:outline-none pr-10">
                        <button type="button" onclick="togglePassword('login-password', this)"
                            class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500 hover:text-gray-700">
                            <!-- SVG -->
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit"
                    class="w-full bg-primary-500 text-white font-bold py-2 rounded-lg hover:bg-primary-600 transition">Login</button>
            </form>
            <div class="mt-6 pt-6 border-t border-gray-100 text-center">
                <p class="text-gray-500 text-sm mb-3">Don't have an account?</p>
                <button onclick="showRegister()"
                    class="w-full bg-white border border-primary-500 text-primary-500 font-bold py-2 rounded-lg hover:bg-primary-50 transition">Request
                    Admin Access</button>
            </div>
        </div>

        <!-- Register Section -->
        <div id="register-section" class="hidden">
            <h1 class="text-2xl font-bold text-center text-gray-900 mb-2">Request Access</h1>
            <p class="text-center text-gray-500 text-sm mb-6">Create an account. Approval required.</p>
            <form id="register-form" class="space-y-4">
                <!-- Register inputs -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="reg-name" required
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="reg-email" required
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="reg-password" required
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:outline-none pr-10">
                        <button type="button" onclick="togglePassword('reg-password', this)"
                            class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500 hover:text-gray-700">
                            <!-- SVG -->
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit"
                    class="w-full bg-primary-500 text-white font-bold py-2 rounded-lg hover:bg-primary-600 transition">Register</button>
            </form>
            <div class="mt-6 pt-6 border-t border-gray-100 text-center">
                <p class="text-gray-500 text-sm mb-3">Already have an account?</p>
                <button onclick="showLogin()"
                    class="w-full bg-white border border-gray-300 text-gray-700 font-bold py-2 rounded-lg hover:bg-gray-50 transition">Back
                    to Login</button>
            </div>
        </div>

        <div class="mt-6 text-center">
            <a href="../index.html" class="text-sm text-gray-400 hover:text-gray-600">Back to Site</a>
        </div>
    </div>

    <script>
        // Toggle Logic
        function showRegister() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('register-section').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('register-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('svg');
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
            } else {
                input.type = "password";
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            }
        }

        // Helper: ensure DB is ready before any operation
        async function ensureDB() {
            console.log("ensureDB: Checking status...");
            
            // Already loaded?
            if (window.DB && typeof window.DB.loginUser === 'function') {
                try { 
                    await window.DB.init(); 
                    console.log("ensureDB: Ready (pre-loaded)");
                    return true; 
                } catch(e) {
                    console.warn("ensureDB: Init error:", e);
                }
            }

            // Wait loop for scripts
            for (let i = 0; i < 10; i++) {
                await new Promise(r => setTimeout(r, 300));
                if (window.DB && typeof window.DB.loginUser === 'function') {
                    try { 
                        await window.DB.init(); 
                        console.log("ensureDB: Ready after wait");
                        return true; 
                    } catch(e) {}
                }
            }

            // Attempt dynamic recovery
            console.log("ensureDB: Attempting script recovery...");
            try {
                const scripts = [
                    { id: 'supabase-sdk', src: 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2' },
                    { id: 'config-js', src: '../js/config.js' },
                    { id: 'db-js', src: '../js/db.js' }
                ];

                for (const script of scripts) {
                    if (!document.getElementById(script.id)) {
                        console.log(`ensureDB: Loading ${script.src}...`);
                        await new Promise((resolve, reject) => {
                            const s = document.createElement('script');
                            s.id = script.id;
                            s.src = script.src;
                            s.onload = resolve;
                            s.onerror = () => {
                                console.error(`Failed to load ${script.src}`);
                                resolve(); // Continue anyway
                            };
                            document.head.appendChild(s);
                        });
                    }
                }

                await new Promise(r => setTimeout(r, 500));
                if (window.DB && typeof window.DB.loginUser === 'function') {
                    await window.DB.init();
                    return true;
                }
            } catch(e) {
                console.error("ensureDB: Recovery failed:", e);
            }

            return false;
        }

        // Login Handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('#login-form button[type="submit"]');
            const origText = btn.innerHTML;
            btn.innerHTML = 'Logging in...';
            btn.disabled = true;

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const dbReady = await ensureDB();
                if (!dbReady) {
                    throw new Error("Database connection not ready. Please check your internet connection.");
                }

                // Call Supabase Auth
                const authUser = await window.DB.loginUser(email, password);

                if (!authUser) {
                    throw new Error("Login failed - No user data returned.");
                }

                // Fetch Profile Data (Name & Role)
                let name = authUser.user_metadata?.full_name || 'Admin';
                let role = 'staff';

                try {
                    const { data: profile } = await supabaseClient
                        .from('profiles')
                        .select('full_name, role')
                        .eq('id', authUser.id)
                        .single();
                    
                    if (profile) {
                        name = profile.full_name || name;
                        role = profile.role || role;
                    }
                } catch (e) {
                    console.warn("Profile fetch failed, using metadata fallback:", e);
                }

                // Manage Session
                const sessionData = {
                    ...authUser,
                    name: name,
                    role: role
                };

                sessionStorage.setItem('biltone_session', JSON.stringify(sessionData));
                window.location.href = 'dashboard.html';

            } catch (err) {
                console.error("Login: Full Error Object:", err);
                let message = err.message || "Unknown error";
                
                // Specific helpful messages
                if (message.toLowerCase().includes("invalid login credentials")) {
                    message = "Invalid email or password. Please verify your typing.";
                } else if (message.toLowerCase().includes("email not confirmed")) {
                    message = "Your email has not been confirmed yet. Please check your inbox or disable 'Confirm Email' in Supabase Settings.";
                }

                alert("Login Failed Detail:\n" + message + (err.status ? "\n(Code: " + err.status + ")" : ""));
                btn.innerHTML = origText;
                btn.disabled = false;
            }
        });

        // Register Handler
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('#register-form button[type="submit"]');
            const origText = btn.innerHTML;
            btn.innerHTML = 'Registering...';
            btn.disabled = true;

            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            try {
                const dbReady = await ensureDB();
                if (!dbReady) {
                    throw new Error("Database connection not ready. Please check your internet connection and refresh the page.");
                }

                await window.DB.registerUser(email, password, name);

                alert("Registration Successful! Please check your email for a confirmation link (if enabled in Supabase) and then log in.");
                showLogin();
            } catch (err) {
                alert("Registration Failed:\n" + err.message);
            } finally {
                btn.innerHTML = origText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
