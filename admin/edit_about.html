<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Content | Biltone Supplies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind.config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/main.js"></script>
</head>

<body class="bg-gray-50 font-sans text-gray-800 flex h-screen overflow-hidden">

    <!-- Sidebar Overlay for Mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black opacity-50 z-40 hidden md:hidden transition-opacity"></div>

    <!-- Sidebar -->
    <aside id="admin-sidebar" class="w-64 bg-white shadow-xl border-r border-gray-200 fixed inset-y-0 left-0 z-50 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b border-gray-100">
            <h2 class="text-2xl font-bold text-primary-900">Admin Panel</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="dashboard.html"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition">Dashboard</a>
            <a href="products.html"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition">Products</a>
            <a href="orders.html" id="orders-link"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition">Orders</a>
            <a href="users.html" id="users-link"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition hidden">Manage Users</a>
            <a href="messages.html"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition">Messages</a>
            <a href="edit_about.html" id="content-link"
                class="block px-4 py-2 bg-primary-50 text-primary-700 font-medium rounded-lg transition hidden">About Us</a>
            <a href="settings.html" id="settings-link"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition">Site Settings</a>
            <a href="profile.html"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition">Profile</a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <button onclick="App.logout()"
                class="flex items-center gap-2 text-gray-600 hover:text-red-600 transition w-full px-4 py-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Log Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden max-w-full">
        <!-- Mobile Header -->
        <header class="bg-white border-b border-gray-200 p-4 md:hidden flex justify-between items-center sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button id="mobile-sidebar-btn" class="p-1 text-gray-600 hover:bg-gray-100 rounded transition focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <h1 class="font-bold text-lg text-gray-900">About Us</h1>
            </div>
            <button onclick="App.logout()" class="text-sm font-semibold text-gray-600 hover:text-red-600 transition">Log Out</button>
        </header>

        <div class="flex-1 overflow-x-hidden overflow-y-auto w-full">
        <div class="container mx-auto px-4 py-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h1 class="text-2xl font-bold text-gray-900 font-primary hidden md:block">Edit "About Us" Content</h1>
            <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8 space-y-8">
                <!-- Titles & Text -->
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider">Main Banner Title</label>
                        <input type="text" id="about-title" placeholder="e.g., About Biltone Supplies"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 focus:outline-none transition">
                        
                        <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider">Our Story (Long Text)</label>
                        <textarea id="about-text" rows="10" placeholder="Tell your story here..."
                            class="w-full border border-gray-300 rounded-xl p-4 focus:ring-2 focus:ring-primary-500 focus:outline-none transition"></textarea>
                    </div>

                    <!-- Images -->
                    <div class="space-y-4">
                        <div class="p-6 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200">
                            <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wider">Image Spot 1 (URL)</label>
                            <input type="text" id="about-img-1" placeholder="https://image-url.com/photo.jpg"
                                class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 focus:outline-none mb-4">
                            <p class="text-xs text-gray-400">This image appears next to your story.</p>
                        </div>

                        <div class="p-6 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200">
                            <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wider">Image Spot 2 (URL)</label>
                            <input type="text" id="about-img-2" placeholder="https://image-url.com/photo.jpg"
                                class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 focus:outline-none mb-4">
                            <p class="text-xs text-gray-400">This image appears in the mission section.</p>
                        </div>
                    </div>
                </div>

                <!-- Footer/Actions -->
                <div class="flex justify-between items-center pt-8 border-t border-gray-100">
                    <p class="text-sm text-gray-400 italic">Tip: Use high-quality JPG or PNG links for best results.</p>
                    <div class="flex gap-4">
                        <a href="../about.html" target="_blank"
                            class="px-8 py-3 border-2 border-gray-200 rounded-xl text-gray-600 hover:bg-gray-50 transition font-bold">Preview Page</a>
                        <button onclick="saveContent()"
                            class="px-10 py-3 bg-primary-900 text-white rounded-xl hover:bg-black transition font-bold shadow-2xl flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                            Save All Changes
                        </button>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </main>

    <script>
        // Check Auth
        const session = sessionStorage.getItem('biltone_session');
        if (!session) window.location.href = 'login.html';
        const user = JSON.parse(session);

        if (user.role === 'owner') {
            document.getElementById('users-link').classList.remove('hidden');
            document.getElementById('content-link').classList.remove('hidden');
            const ordersLink = document.getElementById('orders-link');
            if (ordersLink) ordersLink.classList.add('hidden');
        } else {
            window.location.href = 'dashboard.html';
        }

        // Load Content
        (async function load() {
            try {
                const content = await window.DB.getContent();
                if (content.aboutTitle) document.getElementById('about-title').value = content.aboutTitle;
                if (content.aboutText) document.getElementById('about-text').value = content.aboutText;
                if (content.aboutImage1) document.getElementById('about-img-1').value = content.aboutImage1;
                if (content.aboutImage2) document.getElementById('about-img-2').value = content.aboutImage2;
            } catch (e) {
                console.error("Editor: Load Error", e);
            }
        })();

        async function saveContent() {
            const btn = document.querySelector('button[onclick="saveContent()"]');
            btn.innerHTML = "Saving...";
            
            const newContent = {
                aboutTitle: document.getElementById('about-title').value,
                aboutText: document.getElementById('about-text').value,
                aboutImage1: document.getElementById('about-img-1').value,
                aboutImage2: document.getElementById('about-img-2').value
            };

            try {
                await window.DB.saveContent(newContent);
                App.showToast('Biltone Supplies Content Updated!');
            } catch (e) {
                alert("Error saving: " + e.message);
            } finally {
                btn.innerHTML = "Save All Changes";
            }
        }
    </script>
</body>

</html>
