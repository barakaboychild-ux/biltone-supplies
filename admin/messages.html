<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Biltone Supplies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind.config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/main.js"></script>
</head>

<body class="bg-gray-50 font-sans text-gray-800 flex h-screen overflow-hidden">

    <!-- Sidebar Overlay for Mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black opacity-50 z-40 hidden md:hidden transition-opacity"></div>

    <!-- Sidebar -->
    <aside id="admin-sidebar" class="w-64 bg-white shadow-xl border-r border-gray-200 fixed inset-y-0 left-0 z-50 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out flex flex-col">
            <h2 class="text-2xl font-bold text-primary-900 font-primary">Admin Panel</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="dashboard.html"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition">Dashboard</a>
            <a href="products.html"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition">Products</a>
            <a href="orders.html" id="orders-link"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition">Orders</a>
            <a href="users.html" id="users-link"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition hidden">Manage Users</a>
            <a href="messages.html"
                class="block px-4 py-2 bg-primary-50 text-primary-700 font-medium rounded-lg transition">Messages</a>
            <a href="edit_about.html" id="content-link"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition hidden">About Us</a>
            <a href="settings.html" id="settings-link"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition">Site Settings</a>
            <a href="profile.html"
                class="block px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg transition">Profile</a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <button onclick="App.logout()"
                class="flex items-center gap-2 text-gray-600 hover:text-red-600 transition w-full px-4 py-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Log Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden max-w-full">
        <!-- Mobile Header -->
        <header class="bg-white border-b border-gray-200 p-4 md:hidden flex justify-between items-center sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button id="mobile-sidebar-btn" class="p-1 text-gray-600 hover:bg-gray-100 rounded transition focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <h1 class="font-bold text-lg text-gray-900">Messages</h1>
            </div>
            <button onclick="App.logout()" class="text-sm font-semibold text-gray-600 hover:text-red-600 transition">Log Out</button>
        </header>

        <div class="flex-1 overflow-x-hidden overflow-y-auto w-full">
        <div class="container mx-auto px-4 py-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h1 class="text-2xl font-bold text-gray-900 font-primary hidden md:block">Customer Inquiries</h1>
                <div class="text-sm text-gray-500 hidden md:block">Welcome, <span id="admin-name" class="font-semibold text-gray-900">Admin</span></div>
                <p class="text-sm text-gray-500">Track and respond to customer messages.</p>
            </div>

            <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-primary-900 text-white text-xs uppercase tracking-widest">
                        <tr>
                            <th class="p-5">Status</th>
                            <th class="p-5">Customer</th>
                            <th class="p-5">Inquiry Details</th>
                            <th class="p-5">Date Received</th>
                            <th class="p-5 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="messages-table" class="divide-y divide-gray-100 text-sm">
                        <!-- Messages go here -->
                    </tbody>
                </table>
            </div>
        </div>
        </div>
        </div>
    </main>

    <script>
        // Check Auth
        const session = sessionStorage.getItem('biltone_session');
        if (!session) window.location.href = 'login.html';
        const user = JSON.parse(session);

        // Display only first name
        if (document.getElementById('admin-name')) {
            const displayName = user.name ? user.name.split(' ')[0] : 'Admin';
            document.getElementById('admin-name').textContent = displayName;
        }

        if (user.role === 'owner') {
            document.getElementById('users-link').classList.remove('hidden');
            document.getElementById('content-link').classList.remove('hidden');
        }

        async function renderMessages() {
            try {
                const messages = await window.DB.getMessages();
                const tbody = document.getElementById('messages-table');
                tbody.innerHTML = '';

                messages.forEach(msg => {
                    const status = msg.status || 'unread';
                    const isUnread = status === 'unread';
                    const isReplied = status === 'replied' || status === 'Replied';
                    
                    // The Notification Dot
                    let dotHtml = '';
                    if (isUnread) {
                        dotHtml = `<div class="w-3 h-3 bg-primary-500 rounded-full animate-pulse mx-auto" title="Unread"></div>`;
                    } else if (isReplied) {
                        dotHtml = `<div class="w-3 h-3 bg-green-500 rounded-full mx-auto" title="Replied"></div>`;
                    }

                    const tr = document.createElement('tr');
                    tr.className = `transition group border-b border-gray-50 ${isUnread ? 'bg-primary-50/30 font-semibold' : 'hover:bg-gray-50'}`;
                    
                    // Function to handle row click
                    tr.onclick = (e) => {
                        // Prevent triggering if clicked on a button or link
                        if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A' && !e.target.closest('button') && !e.target.closest('a')) {
                            if (isUnread) handleAction(msg.id, 'read');
                        }
                    };
                    if (isUnread) tr.classList.add('cursor-pointer');

                    tr.innerHTML = `
                        <td class="p-5 text-center align-middle w-16">
                            ${dotHtml}
                        </td>
                        <td class="p-5">
                            <div class="text-gray-900 ${isUnread ? 'font-bold' : ''}">${msg.name}</div>
                            <div class="text-gray-400 text-xs">${msg.email}</div>
                        </td>
                        <td class="p-5 text-gray-600">
                            <div class="max-w-md line-clamp-2" title="${msg.message.replace(/"/g, '&quot;')}">${msg.message}</div>
                        </td>
                        <td class="p-5 text-gray-400 font-mono text-xs whitespace-nowrap">${new Date(msg.created_at).toLocaleDateString()}</td>
                        <td class="p-5 text-right space-x-2 whitespace-nowrap">
                            <a href="mailto:${msg.email}?subject=Reply from Biltone Supplies&body=Hello ${msg.name},%0D%0A%0D%0AThank you for contacting Biltone Supplies. Regarding your message: '${msg.message}'..." 
                               onclick="handleAction('${msg.id}', 'read')"
                               target="_blank"
                               class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-primary-50 text-primary-700 rounded-lg hover:bg-primary-900 hover:text-white transition font-bold text-xs">
                               Reply
                            </a>
                            <button onclick="handleAction('${msg.id}', 'replied')"
                                class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-green-50 text-green-700 rounded-lg hover:bg-green-600 hover:text-white transition font-bold text-xs"
                                title="Mark as Replied">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                            </button>
                            <button onclick="handleDelete('${msg.id}')"
                                class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-red-50 text-red-700 rounded-lg hover:bg-red-600 hover:text-white transition font-bold text-xs"
                                title="Delete Inquiry">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                if (messages.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-gray-400 italic">No customer inquiries found.</td></tr>';
                }
            } catch (e) {
                console.error(e);
            }
        }

        window.handleAction = async function (id, status) {
            try {
                await window.DB.updateMessageStatus(id, status);
                renderMessages();
            } catch (e) {
                console.error("Action error:", e);
            }
        }

        window.handleDelete = async function (id) {
            if (!confirm("Are you sure you want to delete this inquiry permanently?")) return;
            try {
                await window.DB.deleteMessage(id);
                App.showToast('Message Deleted');
                renderMessages();
            } catch (e) {
                alert("Delete failed: " + e.message);
            }
        }

        renderMessages();
    </script>

</body>

</html>
